<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XWAY Daily Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260323-3" />
    <link rel="stylesheet" href="/styles.css?v=20260323-3" />
  </head>
  <body>
    <aside class="article-sidebar">
      <div class="sidebar-shell">
        <div class="sidebar-top">
          <form id="article-form" class="article-form sidebar-form">
            <div class="toolbar-row top-nav-row">
              <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Свернуть меню" aria-expanded="true">
                <span id="sidebar-toggle-icon" class="sidebar-toggle-icon">−</span>
              </button>
              <div class="preset-select-wrap">
                <select id="range-preset-select" aria-label="Быстрый выбор диапазона">
                  <option value="custom">Период</option>
                  <option value="today">Сегодня</option>
                  <option value="yesterday">Вчера</option>
                  <option value="3">3 дня</option>
                  <option value="7">7 дней</option>
                  <option value="14">14 дней</option>
                  <option value="30">30 дней</option>
                </select>
              </div>
              <label class="compact-date-field" for="start-date">
                <span>Начало</span>
                <input id="start-date" type="date" />
              </label>
              <label class="compact-date-field" for="end-date">
                <span>Конец</span>
                <input id="end-date" type="date" />
              </label>
              <button type="button" id="filter-back-button" class="ghost-button">Назад к кабинетам</button>
              <button type="button" id="filter-refresh-button" class="ghost-button">Обновить товар</button>
            </div>
          </form>
        </div>

        <section class="sidebar-section">
          <div class="sidebar-section-head">
            <h3>Выбор артикула</h3>
            <span id="article-count" class="sidebar-meta"></span>
          </div>
          <div class="selector-wrap">
            <button
              type="button"
              id="article-selector-button"
              class="selector-trigger"
              aria-label="Открыть выбор артикула"
              aria-expanded="false"
            >
              <div class="selector-trigger-copy">
                <strong id="selected-article-title">Артикул не выбран</strong>
                <span id="selected-article-caption"></span>
              </div>
              <span class="selector-trigger-icon">↗</span>
            </button>
          </div>
          <div id="article-chip-list" class="article-chip-list"></div>
          <div class="article-add-row">
            <input
              id="article-input"
              type="text"
              inputmode="numeric"
              placeholder="Добавить артикул"
              aria-label="Добавить артикул"
            />
            <button type="button" id="article-add-button" class="ghost-button accent-button">Добавить</button>
          </div>
          <div class="picker-tools picker-tools-inline">
            <input id="article-picker-search" type="text" placeholder="Фильтр по артикулу, названию, бренду" />
          </div>
          <p id="picker-meta" class="section-note picker-meta-inline"></p>
          <div id="article-nav" class="article-nav article-nav-inline"></div>
        </section>
      </div>
    </aside>

    <div class="page-viewport">
      <div class="page-shell">
        <section id="content" class="content-grid"></section>
      </div>
    </div>

    <template id="product-template">
      <article class="product-panel" data-article="">
        <div class="product-toolbar">
          <div class="product-header">
            <div class="product-cover"></div>
            <div class="product-heading">
              <div class="product-meta"></div>
              <h2></h2>
              <p class="product-subtitle"></p>
            </div>
          </div>

          <div class="product-side">
            <div class="panel-actions">
              <div class="panel-period"></div>
            </div>
            <div class="product-signals"></div>
          </div>
        </div>

        <div class="metrics-grid"></div>

        <div class="tab-bar">
          <button type="button" class="tab-button is-active" data-tab-target="overview">Обзор</button>
          <button type="button" class="tab-button" data-tab-target="daily">По дням</button>
          <button type="button" class="tab-button" data-tab-target="campaign-status">Статусы РК</button>
          <button type="button" class="tab-button" data-tab-target="clusters">Кластеры</button>
          <button type="button" class="tab-button" data-tab-target="hours">Часы</button>
          <button type="button" class="tab-button" data-tab-target="campaign-heatmap">Heatmap РК</button>
          <button type="button" class="tab-button" data-tab-target="bids">Ставки</button>
        </div>

        <div class="tab-panels">
          <section class="tab-panel is-active" data-tab-panel="overview"></section>
          <section class="tab-panel" data-tab-panel="daily"></section>
          <section class="tab-panel" data-tab-panel="campaign-status"></section>
          <section class="tab-panel" data-tab-panel="clusters"></section>
          <section class="tab-panel" data-tab-panel="hours"></section>
          <section class="tab-panel" data-tab-panel="campaign-heatmap"></section>
          <section class="tab-panel" data-tab-panel="bids"></section>
        </div>
      </article>
    </template>

    <div id="detail-modal" class="modal-shell" hidden>
      <div class="modal-backdrop" data-modal-close></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <div>
            <p class="eyebrow modal-eyebrow">Развернутый режим</p>
            <h3 id="modal-title"></h3>
            <p id="modal-note" class="section-note modal-note"></p>
          </div>
          <button type="button" class="ghost-button" data-modal-close>Закрыть</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <div id="article-picker-modal" class="modal-shell" hidden>
      <div class="modal-backdrop" data-picker-close></div>
      <button type="button" id="article-picker-close" hidden tabindex="-1" aria-hidden="true">Закрыть</button>
    </div>

    <script src="/vendor/motion/motion.js?v=20260323-3" defer></script>
    <script src="/vendor/highcharts/highcharts.js?v=20260323-3" defer></script>
    <script type="module" src="/app.js?v=20260323-3" defer></script>
  </body>
</html>
